<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Warehouse Manager — Login</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/login.css"/>
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="grid-overlay"></div>
  </div>

  <div class="login-container">
    <div class="login-brand">
      <div class="brand-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect x="4" y="18" width="32" height="18" rx="2" fill="#F59E0B"/>
          <rect x="10" y="10" width="20" height="10" rx="1" fill="#FBBF24"/>
          <rect x="16" y="4" width="8" height="8" rx="1" fill="#FDE68A"/>
          <rect x="12" y="24" width="6" height="8" fill="#D97706"/>
          <rect x="22" y="24" width="6" height="8" fill="#D97706"/>
        </svg>
      </div>
      <h1>Warehouse<span>Manager</span></h1>
      <p>Sistema de Gestión de Almacén</p>
    </div>

    <div class="login-card">
      <h2>Iniciar Sesión</h2>
      <div id="login-error" class="error-msg hidden">Usuario o contraseña incorrectos</div>

      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" placeholder="Ingresa tu usuario" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>
      <button class="btn-login" onclick="handleLogin()">Entrar al Sistema</button>

      <div class="login-hint">
        <strong>Demo:</strong> admin / admin123 &nbsp;|&nbsp; operador / op123
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
