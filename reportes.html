<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — IDEA SCAN 2.0</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d2b7a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/layout.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/utilities.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <div class="main-content">
    <header class="top-header">
      <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
      <div class="header-title">📈 <span>Reportes</span></div>
    </header>

    <div class="page-body">

      <!-- Filtros de fecha -->
      <div class="card mb-16">
        <div class="card-body">
          <div class="two-col" style="align-items:flex-end;gap:12px">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Desde</label>
              <input type="date" class="form-control" id="fechaDesde">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Hasta</label>
              <input type="date" class="form-control" id="fechaHasta">
            </div>
            <button class="btn btn-navy" onclick="loadReportes()">🔍 Filtrar</button>
          </div>
        </div>
      </div>

      <!-- KPI resumen -->
      <div class="kpi-grid mb-16">
        <div class="kpi-card entrada">
          <div class="kpi-label">Total Entradas</div>
          <div class="kpi-value" id="rEntradas">—</div>
          <div class="kpi-sub">en el período</div>
        </div>
        <div class="kpi-card sal">
          <div class="kpi-label">Total Salidas</div>
          <div class="kpi-value" id="rSalidas">—</div>
          <div class="kpi-sub">en el período</div>
        </div>
        <div class="kpi-card inv">
          <div class="kpi-label">Bultos Entraron</div>
          <div class="kpi-value" id="rBultosE">—</div>
          <div class="kpi-sub">unidades</div>
        </div>
        <div class="kpi-card pkg">
          <div class="kpi-label">Bultos Salieron</div>
          <div class="kpi-value" id="rBultosS">—</div>
          <div class="kpi-sub">unidades</div>
        </div>
      </div>

      <!-- Export buttons -->
      <div class="export-panel mb-16">
        <div class="export-header"><div class="export-title">📤 Exportar</div></div>
        <div class="export-body" style="flex-direction:row;flex-wrap:wrap">
          <button class="export-btn xlsx" onclick="exportCSV('entradas')">📊 Entradas CSV</button>
          <button class="export-btn xlsx" onclick="exportCSV('salidas')">📊 Salidas CSV</button>
          <button class="export-btn xlsx" onclick="exportCSV('inventario')">📦 Inventario CSV</button>
        </div>
      </div>

      <!-- Tabla resumen -->
      <div class="card">
        <div class="card-header">
          <span>📋</span>
          <span class="card-title">Movimientos del Período</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tipo</th>
                <th>Folio</th>
                <th>Fecha</th>
                <th>SKU</th>
                <th>Bultos</th>
                <th>Operador</th>
              </tr>
            </thead>
            <tbody id="reporteBody">
              <tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-300)">Selecciona un período y presiona Filtrar</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>
<div class="toast" id="globalToast"></div>

<script src="src/js/core/config.js"></script>
<script src="src/js/core/auth.js"></script>
<script src="src/js/core/nav.js"></script>
<script src="src/js/pages/reportes.js"></script>
<script>
  const user = requireAuth();
  if (user) {
    renderSidebar('reportes');
    renderBottomNav('reportes');
    // Fechas por defecto: mes actual
    const now   = new Date();
    const desde = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    const hasta = now.toISOString().split('T')[0];
    document.getElementById('fechaDesde').value = desde;
    document.getElementById('fechaHasta').value = hasta;
    loadReportes();
  }
</script>
</body>
</html>
