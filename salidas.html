<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salidas — IDEA SCAN 2.0</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d2b7a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/layout.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/utilities.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <div class="main-content">
    <header class="top-header">
      <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
      <div class="header-title">📤 <span>Salidas</span></div>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModalSalida()">+ Nueva Salida</button>
      </div>
    </header>

    <div class="page-body">
      <div class="search-bar mb-16">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar folio, SKU, destino..." oninput="filterSalidas()">
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Folio</th>
              <th>Fecha</th>
              <th>SKU</th>
              <th>Bultos</th>
              <th>Destino</th>
              <th>Transportista</th>
              <th>Operador</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="salidasBody">
            <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-300)">Cargando salidas...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal Nueva Salida -->
<div class="modal-overlay" id="modalSalida">
  <div class="modal">
    <div class="modal-header">
      <span>📤</span>
      <span class="modal-title">Nueva Salida</span>
      <button class="modal-close" onclick="closeModalSalida()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">SKU <span class="req">*</span></label>
        <input type="text" class="form-control" id="sSku" placeholder="Escanea o escribe el SKU" style="text-transform:uppercase" oninput="checkStock()">
      </div>
      <div id="stockInfo" style="display:none;margin-bottom:10px;padding:8px 12px;border-radius:8px;background:var(--surface2);font-size:12px;color:var(--text-500)"></div>
      <div class="two-col">
        <div class="form-group">
          <label class="form-label">Bultos <span class="req">*</span></label>
          <input type="number" class="form-control" id="sBultos" min="1" value="1">
        </div>
        <div class="form-group">
          <label class="form-label">Fecha</label>
          <input type="date" class="form-control" id="sFecha">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Destino</label>
        <input type="text" class="form-control" id="sDestino" placeholder="Cliente o destino final">
      </div>
      <div class="form-group">
        <label class="form-label">Transportista</label>
        <input type="text" class="form-control" id="sTransportista" placeholder="Empresa de transporte">
      </div>
      <div class="form-group">
        <label class="form-label">Notas</label>
        <textarea class="form-control" id="sNotas" rows="2" placeholder="Observaciones..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModalSalida()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarSalida()">Registrar Salida</button>
    </div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>
<div class="toast" id="globalToast"></div>

<script src="src/js/core/config.js"></script>
<script src="src/js/core/auth.js"></script>
<script src="src/js/core/nav.js"></script>
<script src="src/js/pages/salidas.js"></script>
<script>
  const user = requireAuth();
  if (user) {
    renderSidebar('salidas');
    renderBottomNav('salidas');
    initSalidas();
  }
</script>
</body>
</html>
