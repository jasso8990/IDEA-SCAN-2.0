<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDEA SCAN 2.0 — Iniciar Sesión</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
<link rel="apple-touch-icon" sizes="180x180" href="appletouchicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d2b7a">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0d2b7a;--surface2:#eef1fc;--border:#dde4f5;--text-900:#0a1830;--text-700:#243560;--text-400:#7a90b8;--text-300:#a0b0d0;}
html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:inherit;}input{font-family:inherit;}
.login-bg{min-height:100vh;background:linear-gradient(145deg,#071a52 0%,#0d2b7a 45%,#12388a 100%);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
.login-bg::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;border:1px solid rgba(249,115,22,.08);top:-300px;right:-200px;animation:bgRotate 25s linear infinite;}
.login-bg::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;border:1px solid rgba(249,115,22,.06);bottom:-200px;left:-150px;animation:bgRotate 20s linear infinite reverse;}
@keyframes bgRotate{to{transform:rotate(360deg);}}
.float-box{position:absolute;border-radius:14px;border:1px solid rgba(249,115,22,.12);background:rgba(249,115,22,.04);animation:float 7s ease-in-out infinite;}
.float-box:nth-child(1){width:80px;height:80px;top:10%;left:8%;}
.float-box:nth-child(2){width:50px;height:50px;top:70%;left:5%;animation-delay:1.5s;}
.float-box:nth-child(3){width:100px;height:60px;top:15%;right:6%;animation-delay:3s;}
.float-box:nth-child(4){width:60px;height:60px;bottom:15%;right:10%;animation-delay:1s;}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-18px) rotate(3deg);}}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(249,115,22,.6),transparent);animation:scanMove 4s ease-in-out infinite;}
@keyframes scanMove{0%{top:20%;opacity:0;}20%{opacity:1;}80%{opacity:1;}100%{top:80%;opacity:0;}}
.login-card{position:relative;z-index:10;background:white;border-radius:22px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(7,26,82,.40),0 0 0 1px rgba(249,115,22,.15);overflow:hidden;animation:cardIn .5s cubic-bezier(.34,1.4,.64,1);}
@keyframes cardIn{from{transform:translateY(30px) scale(.95);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
.login-header{background:linear-gradient(145deg,#071a52 0%,#0d2b7a 100%);padding:32px 28px 28px;text-align:center;position:relative;overflow:hidden;border-bottom:3px solid #f97316;}
.login-header::after{content:'';position:absolute;width:200px;height:200px;background:radial-gradient(circle,rgba(249,115,22,.25) 0%,transparent 70%);bottom:-60px;right:-40px;border-radius:50%;}
.login-logo-wrap{width:80px;height:80px;border-radius:20px;overflow:hidden;margin:0 auto 14px;box-shadow:0 8px 32px rgba(249,115,22,.50),0 0 0 3px rgba(249,115,22,.25);position:relative;z-index:1;background:#f97316;display:flex;align-items:center;justify-content:center;font-size:36px;}
.login-logo-wrap img{width:100%;height:100%;object-fit:cover;border-radius:18px;}
.login-app-name{font-family:'Exo 2',sans-serif;font-size:28px;font-weight:900;color:white;letter-spacing:1px;line-height:1;position:relative;z-index:1;}
.login-app-name span{color:#fb923c;}
.login-company{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:2px;text-transform:uppercase;margin-top:5px;position:relative;z-index:1;}
.login-body{padding:28px;}
.login-tagline{text-align:center;font-size:12px;font-weight:600;color:var(--text-400);margin-bottom:22px;text-transform:uppercase;letter-spacing:1px;}
.error-msg{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.20);color:#dc2626;border-radius:9px;padding:10px 14px;font-size:12px;font-weight:500;margin-bottom:16px;display:none;align-items:center;gap:6px;}
.error-msg.show{display:flex;}
.form-group{margin-bottom:16px;}
.form-label{font-size:11px;font-weight:700;color:var(--text-700);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;}
.form-input-wrap{position:relative;display:flex;align-items:center;}
.form-input-icon{position:absolute;left:12px;font-size:15px;pointer-events:none;z-index:1;}
.form-input{width:100%;height:44px;padding:0 12px 0 38px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text-900);background:var(--surface2);transition:all .18s;}
.form-input:focus{outline:none;border-color:#f97316;box-shadow:0 0 0 3px rgba(249,115,22,.12);background:white;}
.form-input::placeholder{color:var(--text-300);}
.input-toggle{position:absolute;right:10px;background:none;border:none;font-size:16px;cursor:pointer;color:var(--text-300);padding:4px;}
.login-btn{width:100%;height:48px;background:linear-gradient(135deg,#f97316,#ea6500);color:white;border:none;border-radius:12px;font-family:'Exo 2',sans-serif;font-size:16px;font-weight:900;cursor:pointer;transition:all .2s;box-shadow:0 6px 24px rgba(249,115,22,.40);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(249,115,22,.50);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.login-footer{text-align:center;margin-top:20px;font-size:11px;color:var(--text-300);}
.spinner{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:white;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:480px){.login-header{padding:24px 22px 22px;}.login-body{padding:22px;}.login-app-name{font-size:24px;}.float-box{display:none;}}
</style>
</head>
<body>
<div class="login-bg">
<div class="scan-line"></div>
<div class="float-box"></div><div class="float-box"></div>
<div class="float-box"></div><div class="float-box"></div>
<div class="login-card">
<div class="login-header">
<div class="login-logo-wrap">
<img src="appletouchicon.png" alt="IDEA Scan" onerror="this.style.display='none';this.parentElement.textContent='📦'">
</div>
<div class="login-app-name">IDEA <span>SCAN</span> 2.0</div>
<div class="login-company">CCA Group</div>
</div>
<div class="login-body">
<div class="login-tagline">Warehouse Management System</div>
<div class="error-msg" id="errMsg"><span>⚠️</span><span id="errText">Error</span></div>
<div class="form-group">
<label class="form-label">Usuario</label>
<div class="form-input-wrap">
<span class="form-input-icon">👤</span>
<input type="text" class="form-input" id="username" placeholder="Ingresa tu usuario" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
</div></div>
<div class="form-group">
<label class="form-label">Contraseña</label>
<div class="form-input-wrap">
<span class="form-input-icon">🔒</span>
<input type="password" class="form-input" id="password" placeholder="Ingresa tu contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
<button class="input-toggle" id="togglePwd" onclick="togglePassword()">👁</button>
</div></div>
<button class="login-btn" id="loginBtn" onclick="doLogin()"><span id="loginBtnText">Iniciar Sesión</span></button>
<div class="login-footer">Sistema de gestión de almacén — Acceso restringido</div>
</div></div></div>
<script>
const SUPABASE_URL='https://usqugtxeynkozlobeojt.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzcXVndHhleW5rb3psb2Jlb2p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwOTYxMzAsImV4cCI6MjA4NjY3MjEzMH0.zs4XiF8AgcE-l3ebtaxvoN7V9rf-6MHWNxMThiQUXKE';
const SESSION_KEY='ideascan_user';
const _sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{db:{schema:'ideascan'}});
if(localStorage.getItem(SESSION_KEY))window.location.replace('dashboard.html');
async function doLogin(){
const username=document.getElementById('username').value.trim().toLowerCase();
const password=document.getElementById('password').value;
const btn=document.getElementById('loginBtn');
const btnText=document.getElementById('loginBtnText');
if(!username||!password){showErr('Ingresa usuario y contraseña');return;}
btn.disabled=true;
btnText.innerHTML='<span class="spinner"></span> Verificando...';
document.getElementById('errMsg').classList.remove('show');
try{
const{data,error}=await _sb.from('usuarios').select('*').eq('username',username).eq('estado','active').single();
if(error||!data)throw new Error('Usuario no encontrado o inactivo');
const hash=data.password_hash;
if(!hash)throw new Error('Usuario sin contraseña configurada');
let valid=(hash===password);
if(!valid){try{valid=(atob(hash)===password);}catch(e){}}
if(!valid)throw new Error('Contraseña incorrecta');
localStorage.setItem(SESSION_KEY,JSON.stringify({id:data.id,nombre:data.nombre_display||data.nombre,username:data.username,rol:data.rol,cliente_id:data.cliente_id,almacen_id:data.almacen_id,color:data.color}));
_sb.from('usuarios').update({ultimo_acceso:new Date().toISOString()}).eq('id',data.id).then(()=>{});
btnText.innerHTML='✓ Acceso concedido';
setTimeout(()=>window.location.replace('dashboard.html'),500);
}catch(err){
showErr(err.message||'Error de autenticación');
btn.disabled=false;btnText.textContent='Iniciar Sesión';
}}
function showErr(msg){document.getElementById('errText').textContent=msg;document.getElementById('errMsg').classList.add('show');}
function togglePassword(){const pwd=document.getElementById('password');pwd.type=pwd.type==='password'?'text':'password';document.getElementById('togglePwd').textContent=pwd.type==='password'?'👁':'🙈';}
</script>
</body>
</html>
