<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario — IDEA SCAN 2.0</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d2b7a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/layout.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/utilities.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <div class="main-content">
    <header class="top-header">
      <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
      <div class="header-title">📦 <span>Inventario</span></div>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModalNuevo()">+ Nuevo SKU</button>
      </div>
    </header>

    <div class="page-body">
      <!-- Buscador -->
      <div class="search-bar mb-16">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar SKU, descripción, cliente..." oninput="filterInventario()">
      </div>

      <!-- Tabla -->
      <div class="table-wrap">
        <table id="invTable">
          <thead>
            <tr>
              <th>SKU</th>
              <th>Descripción</th>
              <th>Cliente</th>
              <th>Cantidad</th>
              <th>Ubicación</th>
              <th>Actualizado</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="invBody">
            <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-300)">Cargando inventario...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal Nuevo SKU -->
<div class="modal-overlay" id="modalNuevo">
  <div class="modal">
    <div class="modal-header">
      <span>📦</span>
      <span class="modal-title">Nuevo SKU</span>
      <button class="modal-close" onclick="closeModalNuevo()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">SKU <span class="req">*</span></label>
        <input type="text" class="form-control" id="newSku" placeholder="Ej. SKU-001234" style="text-transform:uppercase">
      </div>
      <div class="form-group">
        <label class="form-label">Descripción <span class="req">*</span></label>
        <input type="text" class="form-control" id="newDesc" placeholder="Descripción del producto">
      </div>
      <div class="two-col">
        <div class="form-group">
          <label class="form-label">Cantidad</label>
          <input type="number" class="form-control" id="newCantidad" value="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Stock mínimo</label>
          <input type="number" class="form-control" id="newStockMin" value="5" min="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Ubicación</label>
        <input type="text" class="form-control" id="newUbicacion" placeholder="Ej. A-01-02">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModalNuevo()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarSKU()">Guardar SKU</button>
    </div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>
<div class="toast" id="globalToast"></div>

<script src="src/js/core/config.js"></script>
<script src="src/js/core/auth.js"></script>
<script src="src/js/core/nav.js"></script>
<script src="src/js/pages/inventario.js"></script>
<script>
  const user = requireAuth();
  if (user) {
    renderSidebar('inventario');
    renderBottomNav('inventario');
    loadInventario();
  }
</script>
</body>
</html>
