<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario — IDEA SCAN 2.0</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon32.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d2b7a">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="src/css/base.css">
<link rel="stylesheet" href="src/css/layout.css">
<link rel="stylesheet" href="src/css/components.css">
<link rel="stylesheet" href="src/css/utilities.css">
<style>
.sku-row{cursor:pointer;transition:background .12s;}
.sku-row:hover{background:rgba(249,115,22,.06)!important;}
.sku-link{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--navy);font-size:13px;text-decoration:underline dotted;}
.det-modal{background:white;border-radius:16px;width:100%;max-width:860px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(13,43,122,.25);}
.det-hdr{padding:18px 22px;background:var(--navy);border-radius:16px 16px 0 0;border-bottom:3px solid #f97316;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
.det-sku-big{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:900;color:white;flex:1;}
.det-tabs{display:flex;gap:4px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);}
.det-tab{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-400);border:none;background:transparent;transition:all .15s;}
.det-tab.active{background:var(--navy);color:white;}
.det-panel{display:none;padding:20px;}
.det-panel.active{display:block;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
.info-item{background:var(--surface2);border-radius:9px;padding:10px 14px;}
.info-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-400);margin-bottom:3px;}
.info-val{font-size:13px;font-weight:600;color:var(--navy);word-break:break-word;}
.img-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.img-card{border-radius:10px;overflow:hidden;border:2px solid var(--border);position:relative;aspect-ratio:1;cursor:pointer;transition:border-color .15s;}
.img-card:hover{border-color:#f97316;}
.img-card img{width:100%;height:100%;object-fit:cover;}
.img-dl{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.65);border:none;color:white;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .15s;}
.img-card:hover .img-dl{opacity:1;}
.label-card{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.label-card-hdr{padding:10px 14px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.label-preview-wrap{padding:16px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;background:white;overflow-x:auto;}
/* Label styles */
.lbl-4x3{width:384px;border:1.5px solid #000;font-family:Arial,sans-serif;background:white;flex-shrink:0;}
.lbl-3x2{width:288px;border:1.5px solid #000;font-family:Arial,sans-serif;background:white;flex-shrink:0;}
.lbl-hdr{text-align:center;font-size:11px;font-weight:900;padding:5px 8px 2px;border-bottom:1px solid #000;letter-spacing:1px;}
.lbl-sku{font-size:30px;font-weight:900;padding:2px 8px;line-height:1.1;}
.lbl-sku-sm{font-size:22px;font-weight:900;padding:2px 8px;line-height:1.1;}
.lbl-bc-row{padding:2px 8px;display:flex;align-items:center;gap:6px;}
.lbl-bc{font-family:'Libre Barcode 39',cursive;font-size:44px;line-height:1;flex:1;}
.lbl-bc-sm{font-family:'Libre Barcode 39',cursive;font-size:34px;line-height:1;flex:1;}
.lbl-qr{width:50px;height:50px;background:#000;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lbl-qr span{color:white;font-size:5px;text-align:center;word-break:break-all;padding:3px;line-height:1.2;}
.lbl-row{display:flex;padding:2px 8px;font-size:10px;gap:4px;}
.lbl-lbl{font-weight:700;white-space:nowrap;}
.lbl-div{border-top:1.5px solid #000;margin:3px 8px;}
.lbl-area{text-align:center;font-size:32px;font-weight:900;padding:2px 8px;line-height:1.1;}
.lbl-area-sm{text-align:center;font-size:24px;font-weight:900;padding:2px 8px;line-height:1.1;}
.lbl-foot{display:flex;justify-content:space-between;padding:2px 8px 5px;font-size:10px;}
/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:80vh;border-radius:8px;object-fit:contain;}
.lb-close{position:fixed;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
@media print{body>*:not(#printArea){display:none!important;}#printArea{display:block!important;}}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <div class="main-content">
    <header class="top-header">
      <button class="hamburger" onclick="toggleSidebar()"><span></span></button>
      <div class="header-title">📦 <span>Inventario</span></div>
    </header>
    <div class="page-body">
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
        <div class="search-bar" style="flex:1;min-width:200px;">
          <span>🔍</span>
          <input type="text" id="searchInput" placeholder="Buscar SKU, parte, vendor, tracking..." oninput="filtrar()">
        </div>
        <select class="form-control" id="filtroCliente" style="width:150px;height:40px;" onchange="filtrar()">
          <option value="">Todos los clientes</option>
        </select>
        <select class="form-control" id="filtroEstado" style="width:130px;height:40px;" onchange="filtrar()">
          <option value="">Todos</option>
          <option value="activo">En almacén</option>
          <option value="salida">Con salida</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>SKU</th><th>N° Parte</th><th>Descripción</th>
            <th>Cliente</th><th>Vendor</th><th>Bultos</th>
            <th>Área</th><th>Fecha Entrada</th><th>Estado</th>
          </tr></thead>
          <tbody id="invBody"><tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-300)">Cargando inventario...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<!-- ══ MODAL DETALLE ══ -->
<div class="modal-overlay" id="modalDetalle" style="align-items:flex-start;padding:10px;overflow-y:auto;">
  <div class="det-modal">
    <div class="det-hdr">
      <div style="flex:1;min-width:0;">
        <div style="font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;">SKU</div>
        <div class="det-sku-big" id="detSku">—</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
        <span class="badge badge-orange" id="detEstadoBadge">—</span>
        <button id="btnEditarSKU" class="btn btn-primary btn-sm" onclick="abrirEditar()">✏️ Editar</button>
        <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.2);" onclick="exportarExcel()">📊 Excel</button>
        <button class="modal-close" onclick="cerrarDetalle()">✕</button>
      </div>
    </div>
    <div class="det-tabs">
      <button class="det-tab active" onclick="detTab('info')">📋 Información</button>
      <button class="det-tab" onclick="detTab('imagenes')">📷 Fotos</button>
      <button class="det-tab" onclick="detTab('labels')">🏷️ Labels</button>
    </div>

    <!-- INFO -->
    <div class="det-panel active" id="dpInfo">
      <div class="info-grid" id="infoGrid"></div>
      <div id="editForm" style="display:none;margin-top:16px;">
        <div style="background:var(--navy);border-radius:10px;padding:12px 16px;margin-bottom:12px;font-family:'Exo 2',sans-serif;font-size:13px;font-weight:800;color:white;">✏️ Editar información del SKU</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div class="form-group"><label class="form-label">Número de Parte</label><input class="form-control" id="eNumParte"></div>
          <div class="form-group"><label class="form-label">Descripción</label><input class="form-control" id="eDesc"></div>
          <div class="form-group"><label class="form-label">Vendor</label><input class="form-control" id="eVendor"></div>
          <div class="form-group"><label class="form-label">Carrier</label><input class="form-control" id="eCarrier"></div>
          <div class="form-group"><label class="form-label">Tracking #</label><input class="form-control" id="eTracking"></div>
          <div class="form-group"><label class="form-label">PO / Orden</label><input class="form-control" id="ePO"></div>
          <div class="form-group"><label class="form-label">Cantidad</label><input class="form-control" type="number" id="eCantidad"></div>
          <div class="form-group"><label class="form-label">Bultos</label><input class="form-control" type="number" id="eBultos"></div>
          <div class="form-group"><label class="form-label">Área</label>
            <select class="form-control" id="eArea"><option>OPS</option><option>REC</option><option>QA</option><option>SHIP</option><option>HOLD</option></select>
          </div>
          <div class="form-group"><label class="form-label">Ubicación</label><input class="form-control" id="eUbicacion"></div>
          <div class="form-group"><label class="form-label">Serial Number</label><input class="form-control" id="eSerial"></div>
          <div class="form-group"><label class="form-label">País Origen</label><input class="form-control" id="eOrigen"></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:12px;">
          <button class="btn btn-ghost" onclick="cancelarEditar()">Cancelar</button>
          <button class="btn btn-primary" style="flex:1;" onclick="guardarEdicion()">💾 Guardar cambios</button>
        </div>
      </div>
    </div>

    <!-- FOTOS -->
    <div class="det-panel" id="dpImagenes">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <div style="font-size:13px;font-weight:600;color:var(--text-500);" id="fotoCount">0 fotos</div>
        <div style="display:flex;gap:8px;">
          <label class="btn btn-primary btn-sm" style="cursor:pointer;" id="btnAgregarFoto">
            📷 Agregar fotos
            <input type="file" accept="image/*" multiple capture="environment" style="display:none" onchange="subirFotosExistente(event)">
          </label>
          <button class="btn btn-ghost btn-sm" onclick="descargarTodasFotos()">⬇️ Descargar todas</button>
        </div>
      </div>
      <div id="uploadProgress" style="display:none;background:rgba(13,43,122,.08);border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;font-weight:600;color:var(--navy);">
        ⏳ Subiendo fotos... <span id="uploadProgressText"></span>
      </div>
      <div class="img-gallery" id="imgGallery"></div>
    </div>

    <!-- LABELS -->
    <div class="det-panel" id="dpLabels">
      <div id="labelActions" style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
        <button class="btn btn-navy btn-sm" onclick="imprimirTodosLabels()">🖨️ Imprimir todos</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleEditarLabels()">✏️ Modificar labels</button>
      </div>
      <div id="editLabelForm" style="display:none;background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:14px;">
        <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px;">✏️ Editar datos del label</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          <div class="form-group"><label class="form-label" style="font-size:10px;">Vendor</label><input class="form-control" id="lVendor" style="height:34px;font-size:12px;" oninput="renderLabelsPreview()"></div>
          <div class="form-group"><label class="form-label" style="font-size:10px;">Carrier</label><input class="form-control" id="lCarrier" style="height:34px;font-size:12px;" oninput="renderLabelsPreview()"></div>
          <div class="form-group"><label class="form-label" style="font-size:10px;">Tracking</label><input class="form-control" id="lTracking" style="height:34px;font-size:12px;" oninput="renderLabelsPreview()"></div>
          <div class="form-group"><label class="form-label" style="font-size:10px;">Área</label>
            <select class="form-control" id="lArea" style="height:34px;font-size:12px;" onchange="renderLabelsPreview()">
              <option>OPS</option><option>REC</option><option>QA</option><option>SHIP</option><option>HOLD</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label" style="font-size:10px;">Bulto #</label><input class="form-control" type="number" id="lBultoNum" style="height:34px;font-size:12px;" oninput="renderLabelsPreview()" min="1" value="1"></div>
          <div class="form-group"><label class="form-label" style="font-size:10px;">Total bultos</label><input class="form-control" type="number" id="lBultoTotal" style="height:34px;font-size:12px;" oninput="renderLabelsPreview()" min="1"></div>
        </div>
      </div>
      <div id="labelsContainer"></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="cerrarLightbox()">✕</button>
  <img id="lbImg" src="" alt="Foto">
  <a id="lbDlBtn" class="btn btn-primary btn-sm" download>⬇️ Descargar foto</a>
</div>

<div id="printArea" style="display:none;"></div>

<script src="src/js/core/config.js"></script>
<script src="src/js/core/auth.js"></script>
<script src="src/js/core/nav.js"></script>
<script>
'use strict';
let _user, _items=[], _filtered=[], _detalle=null, _clientes=[];
const PUEDE_EDITAR = u => u && ['admin','supervisor','operador'].includes(u.rol);

window.addEventListener('DOMContentLoaded', async () => {
  _user = requireAuth(); if(!_user) return;
  renderSidebar('inventario'); renderBottomNav('inventario');
  await cargarCatalogos();
  await cargarInventario();
});

async function cargarCatalogos() {
  const {data} = await sb().from('clientes').select('id,nombre').eq('activo',true).order('nombre');
  _clientes = data||[];
  const sel = document.getElementById('filtroCliente');
  _clientes.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
}

async function cargarInventario() {
  let q = sb().from('inventario').select(`
    id,sku,numero_parte,descripcion,cliente_id,cantidad,bultos,
    carrier,vendor,tracking_number,po,serial_number,origin,
    area,ubicacion,fecha_entrada,folio_entrada,activo,estado,
    imagenes,part_model,peso,
    clientes:cliente_id(nombre,codigo)
  `).order('fecha_entrada',{ascending:false});
  if(_user.rol!=='admin' && _user.cliente_id) q=q.eq('cliente_id',_user.cliente_id);
  const {data,error} = await q;
  if(error){console.error(error);return;}
  _items = data||[];
  filtrar();
}

function filtrar() {
  const bus = document.getElementById('searchInput').value.toLowerCase();
  const cid = document.getElementById('filtroCliente').value;
  const est = document.getElementById('filtroEstado').value;
  _filtered = _items.filter(i=>{
    const mb = !bus||[i.sku,i.numero_parte,i.descripcion,i.vendor,i.tracking_number,i.po].some(v=>(v||'').toLowerCase().includes(bus));
    const mc = !cid||i.cliente_id===cid;
    const me = !est||(est==='activo'?i.activo!==false:(i.activo===false||i.estado==='salida'));
    return mb&&mc&&me;
  });
  renderTabla();
}

function renderTabla() {
  const tbody = document.getElementById('invBody');
  if(!_filtered.length){tbody.innerHTML=`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-300)">Sin registros</td></tr>`;return;}
  tbody.innerHTML = _filtered.map(i=>{
    const cli   = i.clientes?.nombre||'—';
    const fecha = i.fecha_entrada?new Date(i.fecha_entrada+'T12:00:00').toLocaleDateString('es-MX'):'—';
    const est   = i.activo!==false?'<span class="badge badge-success">En almacén</span>':'<span class="badge badge-danger">Salida</span>';
    return `<tr class="sku-row" onclick="abrirDetalle('${i.id}')">
      <td><span class="sku-link">${i.sku||'—'}</span></td>
      <td style="font-size:12px;">${i.numero_parte||'—'}</td>
      <td style="font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${i.descripcion||'—'}</td>
      <td><span class="badge badge-navy">${cli}</span></td>
      <td style="font-size:12px;">${i.vendor||'—'}</td>
      <td style="text-align:center;font-weight:700;">${i.bultos||'—'}</td>
      <td><span class="badge badge-orange">${i.area||'—'}</span></td>
      <td style="font-size:12px;">${fecha}</td>
      <td>${est}</td>
    </tr>`;
  }).join('');
}

/* ── DETALLE ── */
async function abrirDetalle(id) {
  const item = _items.find(i=>i.id===id); if(!item) return;
  _detalle = item;
  const puedeEditar = PUEDE_EDITAR(_user);
  document.getElementById('btnEditarSKU').style.display = puedeEditar?'inline-flex':'none';
  document.getElementById('labelActions').style.display  = puedeEditar?'flex':'none';
  document.getElementById('detSku').textContent         = item.sku||'—';
  document.getElementById('detEstadoBadge').textContent = item.activo!==false?'📦 En Almacén':'📤 Salida';

  const campos=[
    ['SKU',item.sku],['Folio Entrada',item.folio_entrada],
    ['Número de Parte',item.numero_parte],['Descripción',item.descripcion],
    ['Vendor',item.vendor],['Carrier',item.carrier],
    ['Tracking #',item.tracking_number],['PO / Orden',item.po],
    ['Serial Number',item.serial_number],['Cantidad',item.cantidad],
    ['Bultos',item.bultos],['Área',item.area],
    ['Ubicación',item.ubicacion],['País Origen',item.origin],
    ['Peso',item.peso],['Fecha Entrada',item.fecha_entrada?new Date(item.fecha_entrada+'T12:00:00').toLocaleDateString('es-MX'):'—'],
    ['Cliente',item.clientes?.nombre],
  ];
  document.getElementById('infoGrid').innerHTML = campos.map(([l,v])=>
    `<div class="info-item"><div class="info-lbl">${l}</div><div class="info-val">${v||'—'}</div></div>`
  ).join('');

  // Fotos
  const imgs = item.imagenes||[];
  document.getElementById('fotoCount').textContent = imgs.length+' foto'+(imgs.length!==1?'s':'');
  document.getElementById('imgGallery').innerHTML = imgs.length
    ? imgs.map((url,i)=>`
      <div class="img-card" onclick="abrirLightbox('${url}')">
        <img src="${url}" alt="Foto ${i+1}" loading="lazy" onerror="this.parentElement.style.background='var(--surface2)';this.style.display='none'">
        <button class="img-dl" onclick="event.stopPropagation();descargarFoto('${url}',${i+1})">⬇️</button>
      </div>`).join('')
    : `<div style="text-align:center;padding:40px;color:var(--text-300);grid-column:1/-1;">📷 Sin fotos registradas</div>`;

  cancelarEditar();
  document.getElementById('editLabelForm').style.display='none';
  renderLabelsPreview();
  detTab('info');
  document.getElementById('modalDetalle').classList.add('open');
}

function cerrarDetalle(){document.getElementById('modalDetalle').classList.remove('open');_detalle=null;}

/* ── Subir fotos a entrada existente ── */
async function subirFotosExistente(e){
  if(!_detalle) return;
  const files = Array.from(e.target.files);
  if(!files.length) return;

  const prog = document.getElementById('uploadProgress');
  const progText = document.getElementById('uploadProgressText');
  prog.style.display = 'block';

  let subidas = 0;
  const nuevasUrls = [...(_detalle.imagenes||[])];

  for(let i=0; i<files.length; i++){
    progText.textContent = `${i+1} de ${files.length}...`;
    try{
      const file = files[i];
      const ext  = file.type.includes('png')?'png':'jpg';
      const ts   = Date.now();
      const path = `entries/${_detalle.sku}/${_detalle.folio_entrada||_detalle.sku}_extra_${ts}_${i+1}.${ext}`;
      const {error:upErr} = await sb().storage.from('imagenes').upload(path, file, {upsert:true});
      if(!upErr){
        const {data:urlData} = sb().storage.from('imagenes').getPublicUrl(path);
        nuevasUrls.push(urlData.publicUrl);
        subidas++;
      } else {
        console.warn('Upload error:', upErr.message);
      }
    }catch(err){ console.warn('Upload err:', err); }
  }

  if(subidas > 0){
    // Save updated imagenes array to DB
    const {error} = await sb().from('inventario')
      .update({ imagenes: nuevasUrls })
      .eq('id', _detalle.id);

    if(!error){
      _detalle.imagenes = nuevasUrls;
      // Refresh gallery
      document.getElementById('fotoCount').textContent = nuevasUrls.length+' foto'+(nuevasUrls.length!==1?'s':'');
      document.getElementById('imgGallery').innerHTML = nuevasUrls.map((url,i)=>`
        <div class="img-card" onclick="abrirLightbox('${url}')">
          <img src="${url}" alt="Foto ${i+1}" loading="lazy" onerror="this.parentElement.style.background='var(--surface2)';this.style.display='none'">
          <button class="img-dl" onclick="event.stopPropagation();descargarFoto('${url}',${i+1})">⬇️</button>
        </div>`).join('');
      showToast(`✅ ${subidas} foto${subidas!==1?'s':''} agregada${subidas!==1?'s':''} correctamente`, 'success');
    } else {
      showToast('Error guardando fotos: '+error.message, 'error');
    }
  } else {
    showToast('No se pudieron subir las fotos. Verifica tu conexión.', 'error');
  }

  prog.style.display = 'none';
  e.target.value = ''; // reset file input
}

function detTab(tab){
  const tabs=['info','imagenes','labels'];
  document.querySelectorAll('.det-tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===tab));
  document.querySelectorAll('.det-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('dp'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
}

/* ── EDITAR ── */
function abrirEditar(){
  if(!PUEDE_EDITAR(_user))return;
  const i=_detalle;
  document.getElementById('eNumParte').value =i.numero_parte||'';
  document.getElementById('eDesc').value     =i.descripcion||'';
  document.getElementById('eVendor').value   =i.vendor||'';
  document.getElementById('eCarrier').value  =i.carrier||'';
  document.getElementById('eTracking').value =i.tracking_number||'';
  document.getElementById('ePO').value       =i.po||'';
  document.getElementById('eCantidad').value =i.cantidad||'';
  document.getElementById('eBultos').value   =i.bultos||'';
  document.getElementById('eArea').value     =i.area||'OPS';
  document.getElementById('eUbicacion').value=i.ubicacion||'';
  document.getElementById('eSerial').value   =i.serial_number||'';
  document.getElementById('eOrigen').value   =i.origin||'';
  document.getElementById('editForm').style.display='block';
  document.getElementById('infoGrid').style.display='none';
  document.getElementById('btnEditarSKU').style.display='none';
}

function cancelarEditar(){
  document.getElementById('editForm').style.display='none';
  document.getElementById('infoGrid').style.display='grid';
  document.getElementById('btnEditarSKU').style.display=PUEDE_EDITAR(_user)?'inline-flex':'none';
}

async function guardarEdicion(){
  if(!_detalle)return;
  const row={
    numero_parte:    document.getElementById('eNumParte').value,
    descripcion:     document.getElementById('eDesc').value,
    vendor:          document.getElementById('eVendor').value,
    carrier:         document.getElementById('eCarrier').value,
    tracking_number: document.getElementById('eTracking').value,
    po:              document.getElementById('ePO').value,
    cantidad:        parseInt(document.getElementById('eCantidad').value)||0,
    bultos:          parseInt(document.getElementById('eBultos').value)||1,
    area:            document.getElementById('eArea').value,
    ubicacion:       document.getElementById('eUbicacion').value,
    serial_number:   document.getElementById('eSerial').value,
    origin:          document.getElementById('eOrigen').value,
    updated_at:      new Date().toISOString(),
  };
  const {error}=await sb().from('inventario').update(row).eq('id',_detalle.id);
  if(error){alert('Error: '+error.message);return;}
  Object.assign(_detalle,row);
  const idx=_items.findIndex(i=>i.id===_detalle.id);
  if(idx>=0)Object.assign(_items[idx],row);
  cancelarEditar();
  // Refresh info grid
  const campos=[
    ['SKU',_detalle.sku],['Folio Entrada',_detalle.folio_entrada],
    ['Número de Parte',_detalle.numero_parte],['Descripción',_detalle.descripcion],
    ['Vendor',_detalle.vendor],['Carrier',_detalle.carrier],
    ['Tracking #',_detalle.tracking_number],['PO / Orden',_detalle.po],
    ['Serial Number',_detalle.serial_number],['Cantidad',_detalle.cantidad],
    ['Bultos',_detalle.bultos],['Área',_detalle.area],
    ['Ubicación',_detalle.ubicacion],['País Origen',_detalle.origin],
    ['Peso',_detalle.peso],['Fecha Entrada',_detalle.fecha_entrada||'—'],
    ['Cliente',_detalle.clientes?.nombre],
  ];
  document.getElementById('infoGrid').innerHTML=campos.map(([l,v])=>
    `<div class="info-item"><div class="info-lbl">${l}</div><div class="info-val">${v||'—'}</div></div>`
  ).join('');
  filtrar();
  showToast('SKU actualizado ✅','success');
}

/* ── EXCEL ── */
function exportarExcel(){
  if(!_detalle)return;
  const i=_detalle;
  const bom='\uFEFF';
  const campos=[
    ['SKU',i.sku],['Folio Entrada',i.folio_entrada],['Número de Parte',i.numero_parte],
    ['Descripción',i.descripcion],['Vendor',i.vendor],['Carrier',i.carrier],
    ['Tracking #',i.tracking_number],['PO / Orden',i.po],['Serial Number',i.serial_number],
    ['Cantidad',i.cantidad],['Bultos',i.bultos],['Área',i.area],
    ['Ubicación',i.ubicacion],['País Origen',i.origin],['Peso',i.peso],
    ['Fecha Entrada',i.fecha_entrada],['Cliente',i.clientes?.nombre],
    ['Estado',i.activo!==false?'En Almacén':'Salida'],
  ];
  const csv=bom+'Campo,Valor\n'+campos.map(([l,v])=>`"${l}","${v||''}"`).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${i.sku||'sku'}_detalle.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

/* ── FOTOS ── */
function abrirLightbox(url){
  document.getElementById('lbImg').src=url;
  document.getElementById('lbDlBtn').href=url;
  document.getElementById('lbDlBtn').download=url.split('/').pop()||'foto.jpg';
  document.getElementById('lightbox').classList.add('open');
}
function cerrarLightbox(){document.getElementById('lightbox').classList.remove('open');}
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)cerrarLightbox();});

function descargarFoto(url,num){
  const a=document.createElement('a');a.href=url;a.download=`foto_${num}.jpg`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function descargarTodasFotos(){
  const imgs=_detalle?.imagenes||[];
  if(!imgs.length){alert('Sin fotos para descargar');return;}
  imgs.forEach((url,i)=>setTimeout(()=>descargarFoto(url,i+1),i*500));
}

/* ── LABELS ── */
function getLabelData(){
  const editMode=document.getElementById('editLabelForm').style.display!=='none';
  const i=_detalle;
  return {
    vendor:   editMode?document.getElementById('lVendor').value :(i.vendor||''),
    carrier:  editMode?document.getElementById('lCarrier').value:(i.carrier||''),
    tracking: editMode?document.getElementById('lTracking').value:(i.tracking_number||''),
    area:     editMode?document.getElementById('lArea').value   :(i.area||'OPS'),
    bNum:     editMode?parseInt(document.getElementById('lBultoNum').value)||1   :1,
    bTotal:   editMode?parseInt(document.getElementById('lBultoTotal').value)||i.bultos||1:(i.bultos||1),
    fecha:    i.fecha_entrada?new Date(i.fecha_entrada+'T12:00:00').toLocaleDateString('es-MX'):new Date().toLocaleDateString('es-MX'),
    sku:      i.sku||'',
  };
}

    html+=`<div class="label-card">
      <div class="label-card-hdr">
        <span style="font-size:12px;font-weight:700;color:var(--navy);">Bulto ${b} / ${d.bTotal}</span>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-ghost btn-xs" onclick="imprimirLabel4x3(${b})">🖨️ 4×3</button>
          <button class="btn btn-ghost btn-xs" onclick="imprimirLabel3x2(${b})">🖨️ 3×2</button>
        </div>
      </div>
      <div class="label-preview-wrap">
        <div id="lbl4-${b}" class="lbl-4x3">
          <div class="lbl-hdr">CCA Group</div>
          <div class="lbl-sku">${d.sku}</div>
          <div class="lbl-bc-row"><div class="lbl-bc">*${d.sku}*</div><div class="lbl-qr"><span>${d.sku}</span></div></div>
          <div class="lbl-row"><span class="lbl-lbl">Vendor:</span><span>${d.vendor}</span></div>
          <div class="lbl-row"><span class="lbl-lbl">Fecha:</span><span>${d.fecha}</span></div>
          <div class="lbl-row"><span class="lbl-lbl">Tracking:</span><span>${d.tracking}</span></div>
          <div class="lbl-row"><span class="lbl-lbl">Carrier:</span><span>${d.carrier}</span></div>
          <div class="lbl-div"></div>
          <div class="lbl-area">${d.area}</div>
          <div class="lbl-foot"><span>${b} / ${d.bTotal}</span><span>${d.fecha}</span></div>
        </div>
        <div id="lbl3-${b}" class="lbl-3x2">
          <div class="lbl-hdr">CCA Group</div>
          <div class="lbl-sku-sm">${d.sku}</div>
          <div class="lbl-bc-row"><div class="lbl-bc-sm">*${d.sku}*</div></div>
          <div class="lbl-row"><span class="lbl-lbl">Vendor:</span><span>${d.vendor}</span></div>
          <div class="lbl-row"><span class="lbl-lbl">Tracking:</span><span style="font-size:9px;">${d.tracking}</span></div>
          <div class="lbl-div"></div>
          <div class="lbl-area-sm">${d.area}</div>
          <div class="lbl-foot"><span>${b}/${d.bTotal}</span><span>${d.fecha}</span></div>
        </div>
      </div>
    </div>`;
  }
  document.getElementById('labelsContainer').innerHTML=html||'<div style="text-align:center;padding:30px;color:var(--text-300);">Sin labels</div>';
}

function toggleEditarLabels(){
  if(!PUEDE_EDITAR(_user))return;
  const form=document.getElementById('editLabelForm');
  const show=form.style.display==='none';
  if(show&&_detalle){
    document.getElementById('lVendor').value  =_detalle.vendor||'';
    document.getElementById('lCarrier').value =_detalle.carrier||'';
    document.getElementById('lTracking').value=_detalle.tracking_number||'';
    document.getElementById('lArea').value    =_detalle.area||'OPS';
    document.getElementById('lBultoNum').value=1;
    document.getElementById('lBultoTotal').value=_detalle.bultos||1;
  }
  form.style.display=show?'block':'none';
  if(show)renderLabelsPreview();
}

const PRINT_CSS_4x3=`@page{size:4in 3in;margin:0}body{margin:0}.lbl-4x3{width:4in;font-family:Arial,sans-serif}.lbl-hdr{text-align:center;font-size:11px;font-weight:900;padding:5px 8px 2px;border-bottom:1px solid #000;letter-spacing:1px}.lbl-sku{font-size:30px;font-weight:900;padding:2px 8px;line-height:1.1}.lbl-bc-row{padding:2px 8px;display:flex;align-items:center;gap:6px}.lbl-bc{font-family:'Libre Barcode 39',cursive;font-size:44px;line-height:1;flex:1}.lbl-qr{width:50px;height:50px;background:#000;border-radius:3px;display:flex;align-items:center;justify-content:center}.lbl-qr span{color:white;font-size:5px;text-align:center;word-break:break-all;padding:3px;line-height:1.2}.lbl-row{display:flex;padding:2px 8px;font-size:10px;gap:4px}.lbl-lbl{font-weight:700;white-space:nowrap}.lbl-div{border-top:1.5px solid #000;margin:3px 8px}.lbl-area{text-align:center;font-size:32px;font-weight:900;padding:2px 8px;line-height:1.1}.lbl-foot{display:flex;justify-content:space-between;padding:2px 8px 5px;font-size:10px}`;
const PRINT_CSS_3x2=`@page{size:3in 2in;margin:0}body{margin:0}.lbl-3x2{width:3in;font-family:Arial,sans-serif}.lbl-hdr{text-align:center;font-size:11px;font-weight:900;padding:5px 8px 2px;border-bottom:1px solid #000;letter-spacing:1px}.lbl-sku-sm{font-size:22px;font-weight:900;padding:2px 8px;line-height:1.1}.lbl-bc-row{padding:2px 8px;display:flex;align-items:center;gap:6px}.lbl-bc-sm{font-family:'Libre Barcode 39',cursive;font-size:34px;line-height:1;flex:1}.lbl-row{display:flex;padding:2px 8px;font-size:10px;gap:4px}.lbl-lbl{font-weight:700;white-space:nowrap}.lbl-div{border-top:1.5px solid #000;margin:3px 8px}.lbl-area-sm{text-align:center;font-size:24px;font-weight:900;padding:2px 8px;line-height:1.1}.lbl-foot{display:flex;justify-content:space-between;padding:2px 8px 5px;font-size:10px}`;
const BARCODE_FONT=`<link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet">`;

function doPrint(css,html){
  const pa=document.getElementById('printArea');
  pa.innerHTML=`<style>${css}</style>${BARCODE_FONT}${html}`;
  pa.style.display='block';
  setTimeout(()=>{window.print();pa.style.display='none';pa.innerHTML='';},400);
}

function imprimirLabel4x3(b){const el=document.getElementById('lbl4-'+b);if(el)doPrint(PRINT_CSS_4x3,el.outerHTML);}
function imprimirLabel3x2(b){const el=document.getElementById('lbl3-'+b);if(el)doPrint(PRINT_CSS_3x2,el.outerHTML);}
function imprimirTodosLabels(){
  const total=_detalle?.bultos||1;
  let html='';
  for(let b=1;b<=total;b++){const el=document.getElementById('lbl4-'+b);if(el)html+=el.outerHTML;}
  if(html)doPrint(PRINT_CSS_4x3.replace('@page{size:4in 3in;margin:0}','@page{size:4in 3in;margin:0}.lbl-4x3{page-break-after:always}'),html);
}
