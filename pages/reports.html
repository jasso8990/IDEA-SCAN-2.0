<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reportes — Warehouse Manager</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand-icon-sm">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <rect x="4" y="18" width="32" height="18" rx="2" fill="#F59E0B"/>
          <rect x="10" y="10" width="20" height="10" rx="1" fill="#FBBF24"/>
          <rect x="16" y="4" width="8" height="8" rx="1" fill="#FDE68A"/>
        </svg>
      </div>
      <span class="brand-name">WH Manager</span>
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></a>
      <a href="inventory.html" class="nav-item"><span class="nav-icon">📦</span><span class="nav-label">Inventario</span></a>
      <a href="inbound.html" class="nav-item"><span class="nav-icon">📥</span><span class="nav-label">Entradas</span></a>
      <a href="outbound.html" class="nav-item"><span class="nav-icon">📤</span><span class="nav-label">Salidas</span></a>
      <a href="locations.html" class="nav-item"><span class="nav-icon">🗺️</span><span class="nav-label">Ubicaciones</span></a>
      <a href="reports.html" class="nav-item active"><span class="nav-icon">📈</span><span class="nav-label">Reportes</span></a>
      <a href="users.html" class="nav-item admin-only"><span class="nav-icon">👥</span><span class="nav-label">Usuarios</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">A</div>
        <div>
          <div class="user-name" id="user-display-name">Admin</div>
          <div class="user-role" id="user-display-role">Administrador</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">⏻ Salir</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h1 class="page-title">Reportes</h1>
        <p class="page-subtitle">Análisis y exportación de datos</p>
      </div>
    </header>

    <!-- REPORT SELECTOR -->
    <div class="report-tabs">
      <button class="report-tab active" onclick="showReport('inventory')">📦 Inventario</button>
      <button class="report-tab" onclick="showReport('movements')">🔄 Movimientos</button>
      <button class="report-tab" onclick="showReport('valuation')">💰 Valorización</button>
      <button class="report-tab" onclick="showReport('top-products')">🏆 Top Productos</button>
    </div>

    <!-- REPORT FILTERS -->
    <div class="card mb-4">
      <div class="card-body filters-bar">
        <input type="date" id="report-date-from" placeholder="Desde"/>
        <input type="date" id="report-date-to" placeholder="Hasta"/>
        <select id="report-category">
          <option value="">Todas las categorías</option>
        </select>
        <button class="btn-primary" onclick="generateReport()">🔍 Generar Reporte</button>
        <button class="btn-secondary" onclick="exportReportCSV()">⬇ Exportar CSV</button>
        <button class="btn-secondary" onclick="window.print()">🖨️ Imprimir</button>
      </div>
    </div>

    <!-- REPORT CONTENT -->
    <div class="card" id="report-container">
      <div class="card-header">
        <h2 id="report-title">Reporte de Inventario</h2>
        <span id="report-generated-at"></span>
      </div>
      <div class="card-body">
        <!-- SUMMARY STATS -->
        <div class="report-summary" id="report-summary"></div>
        <!-- TABLE -->
        <table class="data-table" id="report-table">
          <thead id="report-thead"></thead>
          <tbody id="report-tbody">
            <tr><td class="empty-state">Selecciona un reporte y haz clic en Generar</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="../js/auth.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/reports.js"></script>
</body>
</html>
