<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Usuarios — Warehouse Manager</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand-icon-sm">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <rect x="4" y="18" width="32" height="18" rx="2" fill="#F59E0B"/>
          <rect x="10" y="10" width="20" height="10" rx="1" fill="#FBBF24"/>
          <rect x="16" y="4" width="8" height="8" rx="1" fill="#FDE68A"/>
        </svg>
      </div>
      <span class="brand-name">WH Manager</span>
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></a>
      <a href="inventory.html" class="nav-item"><span class="nav-icon">📦</span><span class="nav-label">Inventario</span></a>
      <a href="inbound.html" class="nav-item"><span class="nav-icon">📥</span><span class="nav-label">Entradas</span></a>
      <a href="outbound.html" class="nav-item"><span class="nav-icon">📤</span><span class="nav-label">Salidas</span></a>
      <a href="locations.html" class="nav-item"><span class="nav-icon">🗺️</span><span class="nav-label">Ubicaciones</span></a>
      <a href="reports.html" class="nav-item"><span class="nav-icon">📈</span><span class="nav-label">Reportes</span></a>
      <a href="users.html" class="nav-item active admin-only"><span class="nav-icon">👥</span><span class="nav-label">Usuarios</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">A</div>
        <div>
          <div class="user-name" id="user-display-name">Admin</div>
          <div class="user-role" id="user-display-role">Administrador</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">⏻ Salir</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h1 class="page-title">Gestión de Usuarios</h1>
        <p class="page-subtitle">Administra los accesos al sistema</p>
      </div>
      <div class="header-actions">
        <button class="btn-primary" onclick="openModal('modal-user')">+ Nuevo Usuario</button>
      </div>
    </header>

    <div class="card">
      <div class="card-body">
        <table class="data-table">
          <thead>
            <tr>
              <th>Usuario</th>
              <th>Nombre</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Último acceso</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="users-body">
            <tr><td colspan="6" class="empty-state">Cargando usuarios...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- MODAL ADD/EDIT USER -->
<div class="modal-overlay hidden" id="modal-user">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-user-title">Nuevo Usuario</h3>
      <button class="modal-close" onclick="closeModal('modal-user')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="user-edit-id"/>
      <div class="form-row">
        <div class="form-group">
          <label>Nombre completo *</label>
          <input type="text" id="user-fullname" placeholder="Nombre y apellido"/>
        </div>
        <div class="form-group">
          <label>Usuario (login) *</label>
          <input type="text" id="user-username" placeholder="usuario123"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Contraseña *</label>
          <input type="password" id="user-password" placeholder="Mínimo 6 caracteres"/>
        </div>
        <div class="form-group">
          <label>Rol *</label>
          <select id="user-role">
            <option value="admin">Administrador</option>
            <option value="operador">Operador</option>
            <option value="viewer">Solo lectura</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="user-status">
          <option value="active">Activo</option>
          <option value="inactive">Inactivo</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-user')">Cancelar</button>
      <button class="btn-primary" onclick="saveUser()">Guardar Usuario</button>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/users.js"></script>
</body>
</html>
