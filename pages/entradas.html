<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entradas — WMS</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand-icon-sm"><svg width="26" height="26" viewBox="0 0 40 40" fill="none"><rect x="4" y="18" width="32" height="18" rx="2" fill="#F59E0B"/><rect x="10" y="10" width="20" height="10" rx="1" fill="#FBBF24"/><rect x="16" y="4" width="8" height="8" rx="1" fill="#FDE68A"/></svg></div>
      <span class="brand-name">WH Manager</span>
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></a>
      <a href="inventario.html" class="nav-item"><span class="nav-icon">📦</span><span class="nav-label">Inventario</span></a>
      <a href="entradas.html"   class="nav-item active"><span class="nav-icon">📥</span><span class="nav-label">Entradas</span></a>
      <a href="salidas.html"    class="nav-item"><span class="nav-icon">📤</span><span class="nav-label">Salidas</span></a>
      <a href="ordenes.html"    class="nav-item"><span class="nav-icon">📋</span><span class="nav-label">Órdenes</span></a>
      <a href="ai-scan.html"    class="nav-item"><span class="nav-icon">🤖</span><span class="nav-label">AI Scanner</span></a>
      <a href="reportes.html"   class="nav-item"><span class="nav-icon">📈</span><span class="nav-label">Reportes</span></a>
      <a href="usuarios.html"   class="nav-item admin-only"><span class="nav-icon">👥</span><span class="nav-label">Usuarios</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">A</div>
        <div><div class="user-name" id="user-display-name">—</div><div class="user-role" id="user-display-role">—</div></div>
      </div>
      <button class="btn-logout" onclick="logout()">⏻ Salir</button>
    </div>
  </aside>
  <main class="main-content">
    <header class="page-header">
      <div>
        <h1 class="page-title">Entradas de Mercancía</h1>
        <p class="page-subtitle">Movimientos de entrada · Supabase ideascan.movimientos</p>
      </div>
      <div class="header-actions">
        <button class="btn-secondary" onclick="exportCSV()">⬇ CSV</button>
        <button class="btn-primary" onclick="openModal('modal-mov')">+ Registrar Entrada</button>
      </div>
    </header>
    <div class="filters-bar">
      <input type="text" id="search-input" placeholder="🔍 Buscar folio, SKU, cliente..." oninput="filterMov()"/>
      <input type="date" id="filter-from" onchange="filterMov()"/>
      <input type="date" id="filter-to"   onchange="filterMov()"/>
      <button class="btn-secondary" onclick="reloadMov()">↺</button>
    </div>
    <div class="card">
      <div class="card-body" style="overflow-x:auto">
        <table class="data-table">
          <thead><tr><th>Folio</th><th>Fecha</th><th>SKU</th><th>Descripción</th><th>Cliente</th><th>Almacén</th><th>Cantidad</th><th>Referencia</th><th>Notas</th></tr></thead>
          <tbody id="mov-body"><tr><td colspan="9" class="loading-state">Cargando...</td></tr></tbody>
        </table>
        <div class="table-footer"><span id="table-count">—</span></div>
      </div>
    </div>
  </main>
</div>
<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-mov">
  <div class="modal">
    <div class="modal-header"><h3>Registrar Entrada</h3><button class="modal-close" onclick="closeModal('modal-mov')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>SKU *</label><input type="text" id="mov-sku"/></div>
        <div class="form-group"><label>Descripción</label><input type="text" id="mov-desc"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Cliente *</label><select id="mov-cliente"><option value="">Seleccionar...</option></select></div>
        <div class="form-group"><label>Almacén *</label><select id="mov-almacen"><option value="">Seleccionar...</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Cantidad *</label><input type="number" id="mov-cantidad" value="1" min="1"/></div>
        <div class="form-group"><label>Unidad</label><select id="mov-unidad"><option value="pz">Pieza</option><option value="kg">Kg</option><option value="caja">Caja</option><option value="pallet">Pallet</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Referencia</label><input type="text" id="mov-ref" placeholder="PO, Factura..."/></div>
        <div class="form-group"><label>Ubicación</label><input type="text" id="mov-ubicacion"/></div>
      </div>
      <div class="form-group"><label>Notas</label><textarea id="mov-notas" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-mov')">Cancelar</button>
      <button class="btn-primary" onclick="saveMov()">Registrar Entrada</button>
    </div>
  </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/db.js"></script>
<script src="../js/movimientos.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => initMov('entrada'));</script>
</body>
</html>
