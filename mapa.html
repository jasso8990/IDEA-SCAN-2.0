<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDEA SCAN 2.0 — Mapa de Almacén</title>
<link rel="icon" href="src/assets/favicon16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="src/assets/appletouchicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d2b7a">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Styles -->
<link rel="stylesheet" href="src/css/base.css">
<link rel="stylesheet" href="src/css/layout.css">
<link rel="stylesheet" href="src/css/components.css">
<link rel="stylesheet" href="src/css/utilities.css">
<link rel="stylesheet" href="src/css/pages/mapa.css">
</head>
<body>

<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content">

    <!-- Header -->
    <div class="top-header">
      <button class="hamburger" onclick="toggleSidebar()"><span></span></button>
      <div class="header-title">Mapa <span>de Almacén</span></div>
      <div class="header-actions">
        <select class="warehouse-sel" id="warehouseSel" onchange="loadWarehouseMap()"></select>
        <button class="header-btn" id="editBtn" onclick="toggleEdit()" title="Editar mapa">✏️</button>
        <button class="header-btn" onclick="printMap()" title="Imprimir">🖨️</button>
      </div>
    </div>

    <div class="page-body">

      <!-- Zone type palette (solo en modo edición) -->
      <div id="palette" style="display:none;">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-300);margin-bottom:6px;">
          Agregar zona — clic en el tipo y luego clic en el mapa
        </div>
        <div class="zone-palette" id="zonePalette"></div>
      </div>

      <!-- Map toolbar -->
      <div class="map-toolbar">
        <div id="editHint" style="font-size:11px;color:var(--text-300);"></div>
        <div style="flex:1;"></div>
        <button class="btn btn-ghost btn-sm" id="saveMapBtn" style="display:none;" onclick="saveMap()">💾 Guardar mapa</button>
      </div>

      <!-- Map canvas -->
      <div class="map-container" id="mapContainer" onclick="handleMapClick(event)">
        <div class="map-grid"></div>
        <div id="zonesLayer"></div>
        <div id="mapEmpty" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:520px;color:var(--text-300);">
          <div style="font-size:48px;margin-bottom:12px;">🗺️</div>
          <div style="font-size:14px;font-weight:600;color:var(--text-500);">Selecciona un almacén para ver su mapa</div>
        </div>
      </div>

      <!-- Zone legend -->
      <div class="zone-legend" id="zoneLegend"></div>

    </div>
  </div>
</div>

<!-- ══ MODAL: Editar zona ══ -->
<div class="modal-overlay" id="zoneModal" onclick="if(event.target===this)closeZoneModal()">
  <div class="modal" style="max-width:380px;">
    <div class="modal-header">
      <div class="modal-icon" id="zmIcon" style="font-size:22px;background:rgba(13,43,122,.08)">📦</div>
      <div>
        <div class="modal-title" id="zmTitle">Nueva Zona</div>
        <div class="modal-sub">Configura la zona del almacén</div>
      </div>
      <button class="modal-close" onclick="closeZoneModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nombre de la zona <span class="req">*</span></label>
        <input class="form-input" id="zmNombre" placeholder="Ej. Zona A-01">
      </div>
      <div class="form-group">
        <label class="form-label">Código</label>
        <input class="form-input mono" id="zmCodigo" placeholder="Ej. ZA01" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select class="form-select" id="zmTipo">
          <option value="almacenaje">📦 Almacenaje</option>
          <option value="recepcion">📥 Recepción</option>
          <option value="despacho">📤 Despacho</option>
          <option value="cross_dock">🔄 Cross Dock</option>
          <option value="refrigerado">❄️ Refrigerado</option>
          <option value="restringido">🔒 Restringido</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Capacidad</label>
        <input class="form-input" id="zmCap" type="number" placeholder="100">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeZoneModal()">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="saveZone()">Guardar Zona</button>
    </div>
  </div>
</div>

<div class="bottom-nav" id="bottomNav"></div>
<div class="toast" id="globalToast"></div>

<!-- Scripts -->
<script src="src/js/core/config.js"></script>
<script src="src/js/core/auth.js"></script>
<script src="src/js/core/db.js"></script>
<script src="src/js/core/utils.js"></script>
<script src="src/js/core/nav.js"></script>
<script src="src/js/pages/mapa.js"></script>

</body>
</html>
